<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRO — AI Voice Assistant</title>
  <meta name="description" content="AI Voice Assistant that finds the best deals across all your platforms.">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar-brand">
        <span>BRO</span>
      </div>
      <div class="navbar-links">
        <div class="connected-badges" id="connected-badges"></div>
        <a href="/accounts" class="btn">Connect Accounts</a>
      </div>
    </nav>

    <!-- Chat Container -->
    <div class="chat-container" id="chat-container">
      <!-- Welcome Message -->
      <div class="chat-welcome" id="chat-welcome">
        <h2>Hey! I'm BRO</h2>
        <p>Your AI assistant that finds the best deals across Zomato, Swiggy, Uber, Ola & more.</p>
        <div class="chat-welcome-actions">
          <button class="btn" onclick="quickSearch('Order butter chicken near Koramangala')">Butter Chicken</button>
          <button class="btn" onclick="quickSearch('Find cheapest biryani')">Biryani</button>
          <button class="btn" onclick="quickSearch('Book a ride from Koramangala to MG Road')">Book Ride</button>
          <button class="btn" onclick="quickSearch('Order pizza near Indiranagar')">Pizza</button>
          <button class="btn" onclick="quickSearch('Send deals to my WhatsApp')">WhatsApp Deals</button>
          <button class="btn" onclick="quickSearch('Email me today\\'s best offers')">Email Deals</button>
        </div>
      </div>

      <!-- Chat Messages -->
      <div class="chat-messages" id="chat-messages"></div>
    </div>

    <!-- Bottom Input Bar -->
    <div class="chat-input-bar" id="chat-input-bar">
      <button class="mic-btn-small" id="mic-btn" onclick="toggleMic()">
        <span id="mic-icon">Mic</span>
      </button>
      <input type="text" id="chat-input" class="chat-input" placeholder="Ask me anything... 'Order biryani' or 'Book a cab'" onkeydown="if(event.key==='Enter')sendMessage()">
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <span>➤</span>
      </button>
    </div>

    <!-- Listening Overlay -->
    <div class="listening-overlay" id="listening-overlay">
      <div class="listening-content">
        <div class="listening-mic">
          <div class="listening-pulse"></div>
          <div class="listening-pulse delay-1"></div>
          <div class="listening-pulse delay-2"></div>
          <span>Mic</span>
        </div>
        <p class="listening-text" id="listening-text">Listening...</p>
        <p class="listening-transcript" id="listening-transcript"></p>
        <button class="btn" onclick="stopListening()" style="margin-top:16px;">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/js/voice.js"></script>
  <script src="/js/results.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
